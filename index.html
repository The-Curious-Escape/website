<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Screen Demo</title>
    <style>
        /* Reset and layout */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .split-container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* Styling the halves */
        .side {
            flex: 1; /* Each side takes exactly 50% */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        .left {
            background-color: #ffffff;
            color: #333;
        }

        .right {
            background-color: #0070f3;
            color: white;
        }

        h1 { margin-bottom: 10px; }
        p { opacity: 0.9; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="split-container">
        <div class="side left">
            <h1>The Product</h1>
            <p>You can put your main application content, images, or dashboard view here.</p>
        </div>

        <div class="side right">
            <h1>Feedback Hub</h1>
            <p>Click the bubble in the corner to share your thoughts with us!</p>
        </div>
    </div>

    <script>
        !(function(e, t) {

                    var e = t.createElement("script");

                }
            }
            "function" != typeof e.Featurebase && (e.Featurebase = function() {
                (e.Featurebase.q = e.Featurebase.q || []).push(arguments)
            }), "complete" === t.readyState || "interactive" === t.readyState ? n() : t.addEventListener("DOMContentLoaded", n)
        })(window, document);
    </script>

    <script>
        Featurebase("boot", {
            appId: "69b7a3dea5b0a19faa848d97",

            language: "en"

    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Feedback Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
      "imports": {
        "@material/web/": "https://esm.run/@material/web/",
        "@logto/browser": "https://esm.run/@logto/browser"
      }
    }
    </script>
    <script type="module">import '@material/web/all.js';</script>

    <style>
        body { font-family: 'Roboto', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f1f5f9; }
        .card { padding: 2rem; background: white; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); text-align: center; width: 350px; }
        .hidden { display: none; }
        #user-display { margin: 1.5rem 0; font-weight: 500; color: #1e293b; }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="greeting">Welcome</h2>
        <p id="subtext">Sign in to leave feedback</p>
        
        <div id="user-display" class="hidden"></div>

        <div class="actions">
            <md-filled-button id="signin">Sign In</md-filled-button>
            <md-outlined-button id="signout" class="hidden">Sign Out</md-outlined-button>
        </div>
    </div>

    <script>
        !(function(e,t){var a="featurebase-sdk";function n(){if(!t.getElementById(a)){var e=t.createElement("script");(e.id=a),(e.src="https://do.featurebase.app/js/sdk.js"),t.getElementsByTagName("script")[0].parentNode.insertBefore(e,t.getElementsByTagName("script")[0])}}"function"!=typeof e.Featurebase&&(e.Featurebase=function(){(e.Featurebase.q=e.Featurebase.q||[]).push(arguments)}),"complete"===t.readyState||"interactive"===t.readyState?n():t.addEventListener("DOMContentLoaded",n)})(window,document);
    </script>

    <script type="module">
        import LogtoClient from '@logto/browser';

        const logto = new LogtoClient({
            endpoint: 'https://9cbe0a.logto.app/', // From Logto Console
            appId: 'zf8pq6upcdpd1z6rtvxlf',                    // From Logto Console
            scopes: ['email', 'profile']
        });

        const fbAppId = "69b7a3dea5b0a19faa848d97";
        const redirectUrl = window.location.origin; // e.g. http://localhost:3000

        async function runAuthFlow() {
            // 1. Handle the return trip from Logto
            if (window.location.search.includes('code=')) {
                await logto.handleSignInCallback(window.location.href);
                window.history.replaceState({}, document.title, "/"); 
            }

            const isAuthenticated = await logto.isAuthenticated();

            if (isAuthenticated) {
                const user = await logto.fetchUserInfo();
                
                // Update UI
                document.getElementById('signin').classList.add('hidden');
                document.getElementById('signout').classList.remove('hidden');
                document.getElementById('user-display').classList.remove('hidden');
                document.getElementById('user-display').textContent = user.email;
                document.getElementById('subtext').textContent = "You are logged in.";

                // 2. Identify user to Featurebase
                window.Featurebase("boot", {
                    appId: fbAppId,
                    user: {
                        email: user.email,
                        name: user.name || user.username,
                        id: user.sub
                    }
                });
            } else {
                // Boot Featurebase as Guest
                window.Featurebase("boot", { appId: fbAppId });
            }
        }

        document.getElementById('signin').onclick = () => logto.signIn(redirectUrl);
        document.getElementById('signout').onclick = () => logto.signOut(redirectUrl);

        runAuthFlow();
    </script>
</body>
</html>

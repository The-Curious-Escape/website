<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Curious Escape | Shop</title>
    
    <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/The-Curious-Escape/website/822a7c2bd8c939e81d2ba51dce499f54cf51b4b5/Preview%20(1).svg">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    <script type="importmap">
    {
      "imports": {
        "@material/web/": "https://esm.run/@material/web/",
        "@logto/browser": "https://esm.run/@logto/browser"
      }
    }
    </script>
    <script type="module">import '@material/web/all.js';</script>
</head>
<body>

    <header class="top-nav">
        <div class="nav-left">
            <md-icon-button id="menu-button"><span class="material-symbols-outlined">menu</span></md-icon-button>
            <a href="./" class="nav-brand">
                <img src="https://raw.githubusercontent.com/The-Curious-Escape/website/822a7c2bd8c939e81d2ba51dce499f54cf51b4b5/Preview%20(1).svg" alt="Logo" class="logo-img">
                <span class="brand-name">The Curious Escape</span>
            </a>
        </div>

        <nav class="desktop-links">
            <a href="#home">Home</a>
            <a href="#products">Products</a>
            <a href="#about">About</a>
        </nav>

        <div class="nav-right">
            <div class="search-container" id="search-wrapper">
                <md-icon-button id="search-trigger"><span class="material-symbols-outlined">search</span></md-icon-button>
                <input type="text" id="search-input" placeholder="Search...">
            </div>

            <md-filled-button id="signin">Sign In</md-filled-button>

            <div id="user-profile" class="hidden">
                <div class="profile-trigger" id="usage-anchor">
                    <img id="user-avatar" class="avatar-img" alt="User">
                </div>
                
                <md-menu id="profile-menu" anchor="usage-anchor">
                    <md-menu-item interactive="false" class="profile-info-item">
                        <img slot="start" id="menu-avatar-name" class="avatar-small" alt="User">
                        <div slot="headline"><b id="user-fullname">Loading...</b></div>
                    </md-menu-item>

                    <md-menu-item interactive="false" class="profile-info-item">
                        <img slot="start" id="menu-avatar-email" class="avatar-small" alt="User">
                        <div slot="supporting-text"><sub id="user-email">email@example.com</sub></div>
                    </md-menu-item>

                    <md-divider></md-divider>

                    <md-menu-item href="#account">
                        <span slot="start" class="material-symbols-outlined">settings</span>
                        <div slot="headline">Manage Account</div>
                    </md-menu-item>

                    <md-menu-item href="#subscriptions">
                        <span slot="start" class="material-symbols-outlined">payments</span>
                        <div slot="headline">Manage Subscription</div>
                    </md-menu-item>

                    <md-divider></md-divider>

                    <md-menu-item id="signout-item">
                        <span slot="start" class="material-symbols-outlined" style="color: #d32f2f;">logout</span>
                        <div slot="headline" style="color: #d32f2f;">Logout</div>
                    </md-menu-item>
                </md-menu>
            </div>
        </div>
    </header>

    <md-dialog id="nav-drawer">
        <div slot="content" class="drawer-content">
            <md-list-item href="#home">Home</md-list-item>
            <md-list-item href="#products">Products</md-list-item>
            <md-list-item href="#about">About</md-list-item>
        </div>
    </md-dialog>

    <main>
        <h1>Welcome to The Curious Escape</h1>
        <p>Premium gear for the modern explorer.</p>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Curious Escape | Shop</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    <script type="importmap">
    {
      "imports": {
        "@material/web/": "https://esm.run/@material/web/",
        "@logto/browser": "https://esm.run/@logto/browser"
      }
    }
    </script>
    <script type="module">import '@material/web/all.js';</script>

    <style>
        :root {
            --nav-height: 70px;
            --primary: #0070f3;
            --surface: #ffffff;
            --background: #f8fafc;
            --text: #0f172a;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            padding-top: var(--nav-height); 
            background-color: var(--background);
            color: var(--text);
        }

        /* --- Navigation --- */
        .top-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 14px;
            text-decoration: none;
            color: var(--text);
        }

        .logo-img {
            height: 44px;
            width: auto;
        }

        .brand-name {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.5px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .cart-wrapper {
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            color: var(--text);
        }

        .cart-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--primary);
            color: white;
            font-size: 10px;
            font-weight: bold;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- Grid --- */
        main {
            max-width: 1200px;
            margin: 3rem auto;
            padding: 0 1.5rem;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: var(--surface);
            border-radius: 20px;
            padding: 1.5rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02), 0 2px 4px -1px rgba(0,0,0,0.02);
            border: 1px solid #f1f5f9;
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05);
        }

        .placeholder-img {
            aspect-ratio: 1/1;
            background: #f1f5f9;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #cbd5e1;
        }

        .price {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 1rem 0;
            color: var(--primary);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="/" class="nav-brand">
            <img src="https://raw.githubusercontent.com/The-Curious-Escape/website/822a7c2bd8c939e81d2ba51dce499f54cf51b4b5/Preview%20(1).svg" alt="Logo" class="logo-img">
            <span class="brand-name">The Curious Escape</span>
        </a>

        <div class="nav-right">
            <div class="cart-wrapper">
                <span class="material-symbols-outlined">shopping_bag</span>
                <span class="cart-badge">0</span>
            </div>
            
            <md-filled-button id="signin">Sign In</md-filled-button>
            <div id="user-profile" class="hidden">
                <md-outlined-button id="signout">Sign Out</md-outlined-button>
            </div>
        </div>
    </nav>

    <main>
        <header style="margin-bottom: 4rem; text-align: center;">
            <h1 style="font-size: 2.5rem; margin-bottom: 0.5rem;">The Shop</h1>
            <p style="color: #64748b;">Premium gear for your next adventure.</p>
        </header>

        <div class="product-grid">
            <div class="product-card">
                <div class="placeholder-img"><span class="material-symbols-outlined" style="font-size: 48px;">image</span></div>
                <h3>Adventure Backpack</h3>
                <p class="price">$120.00</p>
                <md-filled-tonal-button>Add to Cart</md-filled-tonal-button>
            </div>
            <div class="product-card">
                <div class="placeholder-img"><span class="material-symbols-outlined" style="font-size: 48px;">image</span></div>
                <h3>Curious Flask</h3>
                <p class="price">$35.00</p>
                <md-filled-tonal-button>Add to Cart</md-filled-tonal-button>
            </div>
            <div class="product-card">
                <div class="placeholder-img"><span class="material-symbols-outlined" style="font-size: 48px;">image</span></div>
                <h3>Escape Hoodie</h3>
                <p class="price">$65.00</p>
                <md-filled-tonal-button>Add to Cart</md-filled-tonal-button>
            </div>
        </div>
    </main>

    <script type="module">
        import LogtoClient from '@logto/browser';

        const logto = new LogtoClient({
            endpoint: 'https://9cbe0a.logto.app/',
            appId: 'zf8pq6upcdpd1z6rtvxlf',
            scopes: ['email', 'profile']
        });

        const redirectUrl = window.location.origin;

        async function init() {
            if (window.location.search.includes('code=')) {
                await logto.handleSignInCallback(window.location.href);
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const isAuthenticated = await logto.isAuthenticated();
            if (isAuthenticated) {
                document.getElementById('signin').classList.add('hidden');
                document.getElementById('user-profile').classList.remove('hidden');
            }
        }

        document.getElementById('signin').onclick = () => logto.signIn(redirectUrl);
        document.getElementById('signout').onclick = () => logto.signOut(redirectUrl);

        init();
    </script>
</body>
</html>

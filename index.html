<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Curious Escape | Shop</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    
    <script type="importmap">
    {
      "imports": {
        "@material/web/": "https://esm.run/@material/web/",
        "@logto/browser": "https://esm.run/@logto/browser"
      }
    }
    </script>
    <script type="module">import '@material/web/all.js';</script>

    <style>
        :root {
            --nav-height: 70px;
            --primary: #0070f3;
            --surface: #ffffff;
            --background: #f8fafc;
            --text: #0f172a;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            margin: 0; 
            padding-top: var(--nav-height); 
            background-color: var(--background);
        }

        /* --- Navigation --- */
        .top-nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--nav-height);
            background: var(--surface);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text);
        }

        .logo-img { height: 42px; width: auto; }
        .brand-name { font-weight: 700; font-size: 1.25rem; }

        .nav-right { display: flex; align-items: center; gap: 20px; }

        /* --- Gravatar Profile Style --- */
        .profile-trigger {
            cursor: pointer;
            display: flex;
            align-items: center;
            border-radius: 50%;
            transition: ring 0.2s;
        }

        .avatar-img {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #f1f5f9;
        }

        .hidden { display: none !important; }
        
        main { max-width: 1100px; margin: 3rem auto; padding: 0 1.5rem; text-align: center; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="./" class="nav-brand">
            <img src="https://raw.githubusercontent.com/The-Curious-Escape/website/822a7c2bd8c939e81d2ba51dce499f54cf51b4b5/Preview%20(1).svg" alt="Logo" class="logo-img">
            <span class="brand-name">The Curious Escape</span>
        </a>

        <div class="nav-right">
            <md-filled-button id="signin">Sign In</md-filled-button>

            <div id="user-profile" class="hidden">
                <div class="profile-trigger" id="menu-anchor">
                    <img id="user-avatar" class="avatar-img" alt="Profile">
                </div>
                <md-menu id="profile-menu" anchor="menu-anchor">
                    <md-menu-item id="signout">
                        <div slot="headline">Sign Out</div>
                    </md-menu-item>
                </md-menu>
            </div>
        </div>
    </nav>

    <main>
        <h1>Welcome to the Shop</h1>
        <p>Explore our exclusive collections.</p>
    </main>

    <script type="module">
        import LogtoClient from '@logto/browser';

        const logto = new LogtoClient({
            endpoint: 'https://9cbe0a.logto.app/',
            appId: 'zf8pq6upcdpd1z6rtvxlf',
            scopes: ['email', 'profile']
        });

        const baseUrl = window.location.origin + "/website";

        // Gravatar v3.0.0 SHA-256 Hashing Logic
        async function getGravatar(email) {
            const address = String(email).trim().toLowerCase();
            const msgBuffer = new TextEncoder().encode(address);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return `https://www.gravatar.com/avatar/${hashHex}?s=200&d=mp`;
        }

        async function init() {
            if (window.location.search.includes('code=')) {
                await logto.handleSignInCallback(window.location.href);
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            const isAuthenticated = await logto.isAuthenticated();
            
            if (isAuthenticated) {
                const user = await logto.fetchUserInfo();
                
                document.getElementById('signin').classList.add('hidden');
                document.getElementById('user-profile').classList.remove('hidden');

                // Set Gravatar v3 Image
                const avatar = document.getElementById('user-avatar');
                avatar.src = await getGravatar(user.email);

                // Setup Menu
                const menu = document.getElementById('profile-menu');
                document.getElementById('menu-anchor').onclick = () => menu.open = !menu.open;
            }
        }

        document.getElementById('signin').onclick = () => logto.signIn(baseUrl);
        document.getElementById('signout').onclick = () => logto.signOut(baseUrl);

        init();
    </script>
</body>
</html>

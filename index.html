<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Featurebase Integration</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <script type="importmap">
    {
      "imports": {
        "@material/web/": "https://esm.run/@material/web/"
      }
    }
    </script>
    <script type="module">
      import '@material/web/all.js';
      import {styles as typescaleStyles} from '@material/web/typography/md-typescale-styles.js';
      document.adoptedStyleSheets.push(typescaleStyles.styleSheet);
    </script>

    <style>
        :root {
            --md-sys-color-primary: #0070f3;
        }
        body {
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f9;
            color: #333;
        }
        .container {
            padding: 2.5rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        h1 { color: var(--md-sys-color-primary); margin-bottom: 8px; }
        p { color: #666; margin-bottom: 24px; }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        pre {
            background: #f1f1f1;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            margin-top: 20px;
            text-align: left;
            overflow-x: auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Feedback Portal</h1>
        <p>Sign in to share your thoughts with us.</p>
        
        <div class="button-group">
            <md-filled-button id="signin">Sign In with SSO</md-filled-button>
            <md-outlined-button id="signout" style="display:none;">Sign Out</md-outlined-button>
        </div>

        <pre id="user-info"></pre>
    </div>

    <script>
        !(function(e, t) {
            var a = "featurebase-sdk";
            function n() {
                if (!t.getElementById(a)) {
                    var e = t.createElement("script");
                    (e.id = a), (e.src = "https://do.featurebase.app/js/sdk.js"), t.getElementsByTagName("script")[0].parentNode.insertBefore(e, t.getElementsByTagName("script")[0])
                }
            }
            "function" != typeof e.Featurebase && (e.Featurebase = function() {
                (e.Featurebase.q = e.Featurebase.q || []).push(arguments)
            }), "complete" === t.readyState || "interactive" === t.readyState ? n() : t.addEventListener("DOMContentLoaded", n)
        })(window, document);

        // Initialize Featurebase
        Featurebase("boot", {
            appId: "69b7a3dea5b0a19faa848d97",
            theme: "light",
            language: "en"
        });
    </script>

</body>
</html>
